<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>수련 - 빛의 선율</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
</head>
<body class="ar-page">

  <!-- AR 씬 -->
  <a-scene
    mindar-image="imageTargetSrc: assets/images/suryeon.mind; autoStart: true;"
    color-space="sRGB"
    renderer="colorManagement: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <a-asset-item id="harp-model" src="assets/models/harp.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false">
  <a-cursor
    fuse="false"
    raycaster="objects: [gltf-model]">
  </a-cursor>
</a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <!-- 3D 하프 -->
      <a-gltf-model
        id="harp"
        src="#harp-model"
        position="0 0 0.1"
        scale="0.15 0.15 0.15"
        rotation="0 0 0"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear">
      </a-gltf-model>

      <!-- 빛 파티클 효과 -->
      <a-entity
        id="particles"
        position="0 0 0.1"
        visible="false">
        <a-sphere
          position="0 0.3 0" scale="0.02 0.02 0.02"
          color="#a8d8ea" opacity="0.8"
          animation="property: position; to: -0.2 0.6
