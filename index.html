<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>빛의 선율 - Melody of Light</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="main-page">

  <div class="main-container">

    <!-- 헤더 -->
    <div class="header">
      <p class="tag">Claude Monet × Interactive webAR</p>
      <h1 class="title">빛의 선율</h1>
      <p class="subtitle">Melody of Light</p>
      <p class="desc">모네의 빛 속에 잠든 악기를 깨워<br>나만의 오케스트라를 완성하세요</p>
    </div>

    <!-- 수집 현황 -->
    <div class="collection-board">
      <p class="board-label">✦ 악기 수집 현황 ✦</p>
      <div class="instruments">
        <div class="instrument-slot empty">
          <div class="slot-icon">𝄞</div>
          <p class="slot-name">하프</p>
          <p class="slot-work">수련</p>
        </div>
        <div class="instrument-slot empty">
          <div class="slot-icon">𝄞</div>
          <p class="slot-name">플루트</p>
          <p class="slot-work">양산을 쓴 여인</p>
        </div>
      </div>
    </div>

    <!-- 안내 -->
    <div class="guide">
      <p class="guide-title">✦ 체험 방법 ✦</p>
      <div class="guide-steps">
        <div class="guide-step">
          <span class="step-num">1</span>
          <span class="step-text">전시장 작품 앞 QR코드를 스캔하세요</span>
        </div>
        <div class="guide-step">
          <span class="step-num">2</span>
          <span class="step-text">화면에 나타난 악기를 터치해 수집하세요</span>
        </div>
        <div class="guide-step">
          <span class="step-num">3</span>
          <span class="step-text">모든 악기를 모아 오케스트라를 완성하세요</span>
        </div>
      </div>
    </div>

    <!-- 작품 바로가기 -->
    <div class="artwork-links">
      <a href="suryeon.html" class="artwork-btn">
        <span class="btn-icon">🎵</span>
        <span class="btn-text">수련으로 이동</span>
      </a>
      <a href="yangsan.html" class="artwork-btn">
        <span class="btn-icon">🎵</span>
        <span class="btn-text">양산을 쓴 여인으로 이동</span>
      </a>
    </div>

  </div>

</body>
</html>
